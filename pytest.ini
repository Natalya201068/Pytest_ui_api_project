[pytest]
# testpaths = test
python_files = *test*.py
python_classes = *Page*
python_functions = *test*
addopts = --alluredir=allure-files
markers =
    api: тестирование api,
    ui:  тестирование ui

filterwarnings =
    ignore:cannot collect test class 'ApiPage'
    ignore:cannot collect test class 'WebPage'